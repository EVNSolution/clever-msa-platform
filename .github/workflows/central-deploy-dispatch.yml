name: Central MSA Deploy Dispatch

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        default: dev
        options:
          - dev
          - stage
          - prod
      targets:
        description: "Comma-separated targets (service-*, front-*, edge-api-gateway). blank = changed-file based"
        required: false
        type: string
      changed_files:
        description: "Optional changed file list (newline-separated)"
        required: false
        type: string
      base_sha:
        required: false
        type: string
      head_sha:
        required: false
        type: string
      dry_run:
        description: "Print commands only"
        required: false
        type: boolean
        default: true
      run_health_check:
        required: false
        type: boolean
        default: true

jobs:
  dispatch:
    name: Start central deploy
    uses: ./.github/workflows/central-deploy.yml
    secrets: inherit
    with:
      environment: ${{ inputs.environment }}
      targets: ${{ inputs.targets }}
      base_sha: ${{ inputs.base_sha }}
      head_sha: ${{ inputs.head_sha }}
      changed_files: ${{ inputs.changed_files }}
      dry_run: ${{ inputs.dry_run }}
      run_health_check: ${{ inputs.run_health_check }}

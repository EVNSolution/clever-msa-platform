name: Provision EC2 App Host

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        required: true
        default: dev
        options:
          - dev
          - stage
          - prod
      subnet_id:
        type: string
        required: true
      security_group_id:
        type: string
        required: true
      instance_profile_name:
        type: string
        required: true
      instance_type:
        type: string
        required: false
        default: t3.large
      volume_size_gb:
        type: string
        required: false
        default: "50"
      key_name:
        type: string
        required: false
      repo_url:
        type: string
        required: false
        description: "Optional git clone URL for bootstrap"

permissions:
  id-token: write
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest
    outputs:
      instance_id: ${{ steps.launch.outputs.instance_id }}
      private_ip: ${{ steps.launch.outputs.private_ip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GH_ACTIONS_INFRA_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Resolve latest Amazon Linux 2023 AMI
        id: ami
        run: |
          ami_id="$(aws ssm get-parameter \
            --name /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64 \
            --query 'Parameter.Value' \
            --output text)"
          echo "ami_id=$ami_id" >> "$GITHUB_OUTPUT"

      - name: Build user-data
        run: |
          cat > /tmp/user-data.sh <<EOF
          #!/bin/bash
          set -euo pipefail
          export REPO_URL='${{ inputs.repo_url }}'
          export REPO_DIR='/srv/clever/clever-msa-platform'
          EOF
          cat scripts/deploy/bootstrap-ec2-amazon-linux-2023.sh >> /tmp/user-data.sh
          chmod +x /tmp/user-data.sh

      - name: Launch instance
        id: launch
        env:
          KEY_ARG: ${{ inputs.key_name }}
        run: |
          key_args=()
          if [ -n "$KEY_ARG" ]; then
            key_args+=(--key-name "$KEY_ARG")
          fi

          result="$(aws ec2 run-instances \
            --image-id "${{ steps.ami.outputs.ami_id }}" \
            --instance-type "${{ inputs.instance_type }}" \
            --iam-instance-profile Name="${{ inputs.instance_profile_name }}" \
            --subnet-id "${{ inputs.subnet_id }}" \
            --security-group-ids "${{ inputs.security_group_id }}" \
            --user-data fileb:///tmp/user-data.sh \
            --block-device-mappings "DeviceName=/dev/xvda,Ebs={VolumeSize=${{ inputs.volume_size_gb }},VolumeType=gp3,DeleteOnTermination=true}" \
            "${key_args[@]}" \
            --tag-specifications "ResourceType=instance,Tags=[{Key=Name,Value=clever-msa-${{ inputs.environment }}-app-host},{Key=CleverProject,Value=clever-msa},{Key=CleverEnvironment,Value=${{ inputs.environment }}},{Key=CleverRole,Value=app-host}]" \
            --query 'Instances[0].[InstanceId,PrivateIpAddress]' \
            --output text)"

          instance_id="$(echo "$result" | awk '{print $1}')"
          private_ip="$(echo "$result" | awk '{print $2}')"
          echo "instance_id=$instance_id" >> "$GITHUB_OUTPUT"
          echo "private_ip=$private_ip" >> "$GITHUB_OUTPUT"
          echo "instance_id=$instance_id"
          echo "private_ip=$private_ip"

      - name: Wait for EC2 status checks
        run: |
          aws ec2 wait instance-status-ok --instance-ids "${{ steps.launch.outputs.instance_id }}"

      - name: Wait for SSM online
        run: |
          instance_id="${{ steps.launch.outputs.instance_id }}"
          for i in $(seq 1 30); do
            status="$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${instance_id}" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text 2>/dev/null || true)"
            if [ "$status" = "Online" ]; then
              echo "SSM online: $instance_id"
              exit 0
            fi
            echo "waiting for SSM online... ($i/30)"
            sleep 10
          done
          echo "SSM did not become online in time for ${instance_id}" >&2
          exit 1

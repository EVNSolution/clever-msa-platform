    artifact: source:git
    wave: 1
    depends_on: []
    compose_service: gateway
    compose_file: development/integration-local-stack/docker-compose.account-driver-settlement.yml
    remote_repo_dir: /srv/clever/clever-msa-platform
    instance_selector: tag:CleverProject=clever-msa,tag:CleverEnvironment={environment},tag:CleverRole=app-host,instance-state-name=running
    health_check: docker-compose-ps
    deploy_command: "scripts/deploy/runner.sh --service edge-api-gateway --env {environment} --mode ec2 --artifact {artifact}"
    rollback_command: "scripts/deploy/rollback.sh --service edge-api-gateway --env {environment}"


name: CI

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install pytest

      - name: Run minimal release tests
        run: |
          pytest \
            release/tests/test_dispatch_ssm.py \
            release/tests/test_release_workflow_contract.py \
            release/tests/test_rollback_target_resolution.py \
            -q

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    resolver 169.254.169.253 valid=10s ipv6=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    geo $trusted_ingress_proxy {
        default 0;
        10.20.0.0/24 1;
        127.0.0.1/32 1;
    }

    map $trusted_ingress_proxy $trusted_forwarded_proto {
        default '';
        1 $http_x_forwarded_proto;
    }

    map $trusted_forwarded_proto $client_forwarded_proto {
        default $scheme;
        ~.+ $trusted_forwarded_proto;
    }

    map $trusted_ingress_proxy $trusted_forwarded_host {
        default '';
        1 $http_x_forwarded_host;
    }

    map $trusted_forwarded_host $client_forwarded_host {
        default $host;
        ~.+ $trusted_forwarded_host;
    }

    map $trusted_ingress_proxy $trusted_forwarded_port {
        default '';
        1 $http_x_forwarded_port;
    }

    map $trusted_forwarded_port $client_forwarded_port {
        default $server_port;
        ~.+ $trusted_forwarded_port;
    }

    map $trusted_ingress_proxy $trusted_forwarded_for {
        default '';
        1 $http_x_forwarded_for;
    }

    map $trusted_forwarded_for $client_forwarded_for {
        default $remote_addr;
        ~.+ $trusted_forwarded_for;
    }

    server {
        listen 8080;

        location = /healthz {
            access_log off;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            return 200;
        }

        location = /openapi.yaml {
            alias /opt/edge/public-api-docs/openapi.yaml;
            default_type application/yaml;
        }

        location = /swagger {
            return 301 /swagger/;
        }

        location /swagger/ {
            alias /opt/edge/public-api-docs/swagger/;
            index index.html;
            try_files $uri $uri/ /swagger/index.html =404;
        }

        location = /redoc {
            return 301 /redoc/;
        }

        location /redoc/ {
            alias /opt/edge/public-api-docs/redoc/;
            index index.html;
            try_files $uri $uri/ /redoc/index.html =404;
        }

        location = /admin/account-access {
            return 301 /admin/account-access/;
        }

        location ^~ /admin/account-access/ {
            proxy_pass http://account-auth-api:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $proxy_host;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $client_forwarded_for;
            proxy_set_header X-Forwarded-Proto $client_forwarded_proto;
            proxy_set_header X-Forwarded-Host $client_forwarded_host;
            proxy_set_header X-Forwarded-Port $client_forwarded_port;
        }

        location ^~ /static/admin/ {
            proxy_pass http://account-auth-api:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $proxy_host;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $client_forwarded_for;
            proxy_set_header X-Forwarded-Proto $client_forwarded_proto;
            proxy_set_header X-Forwarded-Host $client_forwarded_host;
            proxy_set_header X-Forwarded-Port $client_forwarded_port;
        }

        location / {
            proxy_pass http://web-console:5174;
            proxy_http_version 1.1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            proxy_set_header Host $proxy_host;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $client_forwarded_for;
            proxy_set_header X-Forwarded-Proto $client_forwarded_proto;
            proxy_set_header X-Forwarded-Host $client_forwarded_host;
            proxy_set_header X-Forwarded-Port $client_forwarded_port;
        }

        location /api/auth/ {
            rewrite ^/api/auth/(.*)$ /$1 break;

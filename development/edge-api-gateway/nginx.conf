worker_processes auto;

events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 8080;

        location = /admin {
            return 301 /admin/;
        }

        location / {
            set $front_upstream front:5173;
            proxy_pass http://$front_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /admin/ {
            set $admin_front_upstream admin-front:5174;
            proxy_pass http://$admin_front_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/auth/ {
            set $account_auth_upstream account-auth-api:8000;
            rewrite ^/api/auth/(.*)$ /$1 break;
            proxy_pass http://$account_auth_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/drivers/ {
            set $driver_profile_upstream driver-profile-api:8000;
            rewrite ^/api/drivers/(.*)$ /$1 break;
            proxy_pass http://$driver_profile_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/settlements/ {
            set $settlement_upstream settlement-api:8000;
            rewrite ^/api/settlements/(.*)$ /$1 break;
            proxy_pass http://$settlement_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/org/ {
            set $organization_master_upstream organization-master-api:8000;
            rewrite ^/api/org/(.*)$ /$1 break;
            proxy_pass http://$organization_master_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/vehicles/ {
            set $vehicle_asset_upstream vehicle-asset-api:8000;
            rewrite ^/api/vehicles/(.*)$ /$1 break;
            proxy_pass http://$vehicle_asset_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/dispatch/ {
            set $dispatch_registry_upstream dispatch-registry-api:8000;
            rewrite ^/api/dispatch/(.*)$ /$1 break;
            proxy_pass http://$dispatch_registry_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/terminals/ {
            set $terminal_registry_upstream terminal-registry-api:8000;
            rewrite ^/api/terminals/(.*)$ /$1 break;
            proxy_pass http://$terminal_registry_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/telemetry/ {
            set $telemetry_hub_upstream telemetry-hub-api:8000;
            rewrite ^/api/telemetry/(.*)$ /$1 break;
            proxy_pass http://$telemetry_hub_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/telemetry-dead-letters {
            return 301 /api/telemetry-dead-letters/;
        }

        location = /api/telemetry-dead-letters/health {
            return 301 /api/telemetry-dead-letters/health/;
        }

        location = /api/telemetry-dead-letters/health/ {
            set $telemetry_dead_letter_upstream telemetry-dead-letter-api:8000;
            proxy_pass http://$telemetry_dead_letter_upstream/health/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/telemetry-dead-letters/ingest {
            return 404;
        }

        location = /api/telemetry-dead-letters/ingest/ {
            return 404;
        }

        location = /api/telemetry-dead-letters/ {
            set $telemetry_dead_letter_upstream telemetry-dead-letter-api:8000;
            proxy_pass http://$telemetry_dead_letter_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/telemetry-dead-letters/ {
            if ($uri ~ ^/api/telemetry-dead-letters/([0-9a-fA-F-]+)$) {
                return 301 /api/telemetry-dead-letters/$1/;
            }

            set $telemetry_dead_letter_upstream telemetry-dead-letter-api:8000;
            rewrite ^/api/telemetry-dead-letters/([0-9a-fA-F-]+)/$ /$1/ break;
            proxy_pass http://$telemetry_dead_letter_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/driver-vehicle-assignments/ {
            set $driver_vehicle_assignment_upstream driver-vehicle-assignment-api:8000;
            rewrite ^/api/driver-vehicle-assignments/(.*)$ /$1 break;
            proxy_pass http://$driver_vehicle_assignment_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/vehicle-ops/ {
            set $vehicle_ops_upstream vehicle-ops-api:8000;
            rewrite ^/api/vehicle-ops/(.*)$ /$1 break;
            proxy_pass http://$vehicle_ops_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/dispatch-ops/ {
            set $dispatch_ops_upstream dispatch-ops-api:8000;
            rewrite ^/api/dispatch-ops/(.*)$ /$1 break;
            proxy_pass http://$dispatch_ops_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/driver-360/ {
            set $driver_360_upstream driver-360-api:8000;
            rewrite ^/api/driver-360/(.*)$ /$1 break;
            proxy_pass http://$driver_360_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}

      - allowed_nav_keys
      - assigned_count
      - can_delete
      - code
      - company_id
      - company_manager_role_id
      - display_name
      - display_order
      - is_default
      - is_system_required
      - scope_level
    service_account_access__ScopeLevelEnum:
      enum:
      - company
      - fleet
      type: string
      description: '* `company` - Company

        * `fleet` - Fleet'
    service_account_access__CompanyManagerRoleReorder:
      type: object
      properties:
        company_id:
          type: string
          format: uuid
        role_ids:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
      required:
      - company_id
      - role_ids
    service_account_access__PatchedCompanyManagerRoleUpdate:
      type: object
      properties:
        display_name:
          type: string
          maxLength: 120
        code:
          type: string
          pattern: ^[a-z][a-z0-9_]{1,63}$
        scope_level:
          $ref: '#/components/schemas/service_account_access__ScopeLevelEnum'
        allowed_nav_keys:
          type: array
          items:
            type: string
    service_account_access__CompanyManagerRoleCreate:
      type: object
      properties:
        company_id:
          type: string
          format: uuid
        display_name:
          type: string
          maxLength: 120
        scope_level:
          $ref: '#/components/schemas/service_account_access__ScopeLevelEnum'
      required:
      - company_id
      - display_name
      - scope_level

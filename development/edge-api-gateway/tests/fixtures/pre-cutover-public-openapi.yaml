components:
  schemas:
    service_telemetry_dead_letter__TelemetryDeadLetter:
      type: object
      properties:
        telemetry_dead_letter_id:
          type: string
          format: uuid
          readOnly: true
        source_service:
          type: string
          maxLength: 128
        message_topic:
          type: string
          maxLength: 255
        source_terminal_id:
          type: string
          format: uuid
          nullable: true
        source_vehicle_id:
          type: string
          format: uuid
          nullable: true
        message_type:
          type: string
          nullable: true
          maxLength: 128
        payload_json: {}
        received_at:
          type: string
          format: date-time
        failure_class:
          $ref: '#/components/schemas/service_telemetry_dead_letter__FailureClassEnum'
        error_message:
          type: string
        retry_attempts:
          type: integer
          maximum: 2147483647
          minimum: 0
        failure_fingerprint:
          type: string
          maxLength: 255
        failed_at:
          type: string
          format: date-time
      required:
      - error_message
      - failed_at
      - failure_class
      - failure_fingerprint
      - message_topic
      - payload_json
      - received_at
      - retry_attempts
      - source_service
      - telemetry_dead_letter_id
    service_telemetry_dead_letter__FailureClassEnum:
      enum:
      - parse_error
      - hub_4xx
      - hub_5xx_retry_exhausted
      - connection_failure_retry_exhausted
      - timeout_retry_exhausted
      type: string
      description: '* `parse_error` - Parse Error

        * `hub_4xx` - Hub 4xx

        * `hub_5xx_retry_exhausted` - Hub 5xx Retry Exhausted

        * `connection_failure_retry_exhausted` - Connection Failure Retry Exhausted

        * `timeout_retry_exhausted` - Timeout Retry Exhausted'

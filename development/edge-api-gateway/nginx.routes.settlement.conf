        location /api/settlements/ {
            rewrite ^/api/settlements/(.*)$ /$1 break;
            proxy_pass http://settlement-payroll-api:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $proxy_host;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $client_forwarded_for;
            proxy_set_header X-Forwarded-Proto $client_forwarded_proto;
            proxy_set_header X-Forwarded-Host $client_forwarded_host;
            proxy_set_header X-Forwarded-Port $client_forwarded_port;
        }


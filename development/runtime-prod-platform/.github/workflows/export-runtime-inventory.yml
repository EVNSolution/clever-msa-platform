name: Export prod runtime inventory

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - codex/**

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pytest
        run: python -m pip install pytest

      - name: Verify inventory contract
        run: pytest tests/test_inventory_contract.py -q

      - name: Export canonical inventory
        run: python scripts/export-runtime-inventory.py --artifact-dir dist

      - name: Upload inventory artifact
        uses: actions/upload-artifact@v4
        with:
          name: prod-runtime-inventory
          path: dist/

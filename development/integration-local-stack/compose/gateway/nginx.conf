worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Local boundary-simulation placeholders only; final public API paths stay governed by goal/07-legacy-api-mapping.md and the reference docs.
    upstream account_auth_api {
        server account-auth-api:8101;
    }

    upstream driver_profile_api {
        server driver-profile-api:8102;
    }

    upstream settlement_payroll_api {
        server settlement-payroll-api:8103;
    }

    upstream settlement_ops_api {
        server settlement-ops-api:8104;
    }

    upstream organization_master_api {
        server organization-master-api:8105;
    }

    server {
        listen 8080;

        location /api/auth/ {
            proxy_pass http://account_auth_api/;
        }

        location /api/drivers/ {
            proxy_pass http://driver_profile_api/;
        }

        location /api/settlements/ {
            proxy_pass http://settlement_payroll_api/;
        }

        location /api/settlement-ops/ {
            proxy_pass http://settlement_ops_api/;
        }

        # Simulation alias only, not a final external contract name.
        location /api/org/ {
            proxy_pass http://organization_master_api/;
        }
    }
}
